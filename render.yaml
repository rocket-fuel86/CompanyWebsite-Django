services:
  - type: web
    name: companywebsite-django
    env: python
    plan: free

    buildCommand: ./build.sh
    startCommand: >
      gunicorn HW2.wsgi:application --log-level info

    envVars:
      - key: SECRET_KEY
        generateValue: true
        sync: false

      - key: DEBUG
        value: "False"

      - key: ALLOWED_HOSTS
        value: "companywebsite-django.onrender.com"

      - key: PYTHON_VERSION
        value: "3.14"
    runtime: python

databases:
  - name: my-django-db
    databaseName: mydb
    user: myuser
    plan: free