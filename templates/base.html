<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McDonald's</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
</head>
<body>

    <nav class="navbar">
        <a href="{% url 'home' %}" class="navbar-brand">Mc<span>Donald's</span></a>

        <button class="burger" id="burgerBtn" aria-label="Меню" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <ul class="nav" id="navMenu">
            <li><a href="{% url 'news' %}">Новини</a></li>
            <li><a href="{% url 'management' %}">Кар'єра</a></li>
            <li><a href="{% url 'about' %}">Про нас</a></li>
            <li><a href="{% url 'contacts' %}">Контакти</a></li>
            <li><a href="{% url 'product' %}">Форма</a></li>
        </ul>
    </nav>

    <div class="main-wrapper">
        {% block content %}{% endblock %}
        <hr style="margin:40px 0 20px;border:none;border-top:1px solid #EBEBEB;" />
        <footer style="background:none;color:#999;text-align:left;padding:0 0 8px;font-size:.85rem;">
            &copy; 2026 &mdash; McDonald's Ukraine
        </footer>
    </div>

    <script>
        const btn = document.getElementById('burgerBtn');
        const menu = document.getElementById('navMenu');
        btn.addEventListener('click', () => {
            const open = menu.classList.toggle('nav--open');
            btn.classList.toggle('burger--open', open);
            btn.setAttribute('aria-expanded', open);
        });
        menu.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
            menu.classList.remove('nav--open');
            btn.classList.remove('burger--open');
            btn.setAttribute('aria-expanded', false);
        }));
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
